<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">    <title>Bootstrap-Task</title>
</head>
<body>
    <div class="header"></div>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 col-12">
                <div class="bg-white border rounded p-4">
                    <p class="headings"><span>1.</span> Account details</p>
                    <div class="text-end mt-1">
                        <p class="subtext">Already have a account? <span>sign in here</span></p>
                    </div>
                    <div class="formtext row g-4">
                        <div class="col-md-6 col-12">
                            <label for="inputEmail" class="form-label">Email address*</label>
                            <input type="email" class="form-control" placeholder="Email address" id="inputEmail">
                        </div>
                        <div class="col-md-6 col-12">
                            <label for="inputPassword" class="form-label">Password*</label>
                            <input type="password" class="form-control" placeholder="Password" id="inputPassword">
                        </div>
                        <div class="col-md-6 col-12">
                            <label for="firstName" class="form-label">First Name*</label>
                            <input type="text" class="form-control" placeholder="First name" id="firstName">
                        </div>
                        <div class="col-md-6 col-12">
                            <label for="lastName" class="form-label">Last name*</label>
                            <input type="text" class="form-control" placeholder="Last name" id="lastName">
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col-md-8 col-12">
                            <p class="subtext">                            
                                By Creating an account,you agree to the
                                <span>Terms and Conditions</span> set out by this
                                site,including our <span>Cookie Use</span>
                            </p>
                        </div>
                    <div class="col-md-4 col-12">
                        <button type="button" class="btn" >Continue</button>
                    </div>
                    </div>
                </div>
                <div class="bg-white border rounded p-3 mt-3">
                    <p class="headings">
                        <span>2. </span>
                        Billing details
                    </p>
                </div>

                <div class="bg-white border rounded p-3 mt-3">
                    <p class="headings">
                        <span>3. </span>
                        Payment
                    </p>
                </div>
            </div>
            <div class="col-md-4 col-12 mt-md-0 mt-4 mb-4">
                <div class="bg-white border rounded p-4 pb-2">
                    <p class="headings p-0">Order Summary</p>
                <div class="price d-flex flex-row mt-3 justify-content-between">
                        <p>Plan</p>
                        <p>Price</p>
                    </div>

                <div class="price d-flex flex-row  justify-content-between">
                        <p class="price1">Free Trail</p>
                        <p>$0.00</p>
                    </div>
                <hr />
                <div class="price d-flex flex-row  justify-content-between">
                        <p>Total due today</p>
                        <p class="price1">$0.00</p>
                    </div>
                <div class="price price1">
                        <p>Pack Free Trail</p>
                    </div>
                </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</html>
